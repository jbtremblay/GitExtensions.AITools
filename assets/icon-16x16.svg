<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 16 16" width="16" height="16" shape-rendering="crispEdges">
  <!-- 
    Pixel-art design: every rect is 1×1 on a 16×16 grid.
    Export with: inkscape icon-16.svg -w 16 -h 16 -o icon-16.png
  -->

  <!-- GREEN PINS: top (3 pins, connected to chip) -->
  <rect x="5" y="0" width="1" height="3" fill="#6cc644"/>
  <rect x="8" y="0" width="1" height="3" fill="#6cc644"/>
  <rect x="11" y="0" width="1" height="3" fill="#6cc644"/>
  <!-- GREEN PINS: right (3 pins, connected to chip) -->
  <rect x="13" y="5" width="3" height="1" fill="#6cc644"/>
  <rect x="13" y="8" width="3" height="1" fill="#6cc644"/>
  <rect x="13" y="11" width="3" height="1" fill="#6cc644"/>

  <!-- RED PINS: bottom (3 pins, connected to chip) -->
  <rect x="5" y="13" width="1" height="3" fill="#e74c3c"/>
  <rect x="8" y="13" width="1" height="3" fill="#e74c3c"/>
  <rect x="11" y="13" width="1" height="3" fill="#e74c3c"/>
  <!-- RED PINS: left (3 pins, connected to chip) -->
  <rect x="0" y="5" width="3" height="1" fill="#e74c3c"/>
  <rect x="0" y="8" width="3" height="1" fill="#e74c3c"/>
  <rect x="0" y="11" width="3" height="1" fill="#e74c3c"/>

  <!-- CHIP BODY (10×10, from 3,3 to 12,12) -->
  <!-- Shadow (bottom edge) -->
  <rect x="3" y="13" width="10" height="1" fill="#1e4670"/>
  <!-- Main body -->
  <rect x="3" y="3" width="10" height="10" fill="#4a7db8"/>
  <!-- Top highlight row -->
  <rect x="3" y="3" width="10" height="1" fill="#6b9fd4"/>

  <!-- "A" glyph (hand-drawn, columns 4-7, rows 5-11) -->
  <!-- A: left vertical -->
  <rect x="4" y="6" width="1" height="5" fill="white"/>
  <!-- A: right vertical -->
  <rect x="7" y="6" width="1" height="5" fill="white"/>
  <!-- A: top bar -->
  <rect x="5" y="5" width="2" height="1" fill="white"/>
  <!-- A: middle bar -->
  <rect x="5" y="8" width="2" height="1" fill="white"/>

  <!-- "I" glyph (columns 9-11, rows 5-11) -->
  <!-- I: top serif -->
  <rect x="9" y="5" width="3" height="1" fill="white"/>
  <!-- I: vertical -->
  <rect x="10" y="6" width="1" height="4" fill="white"/>
  <!-- I: bottom serif -->
  <rect x="9" y="10" width="3" height="1" fill="white"/>
</svg>